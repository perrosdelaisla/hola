<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Perros de la Isla · Consulta con Victoria, coordinadora de adiestramiento canino en Mallorca">
  <title>Perros de la Isla · Hola</title>
  <!-- Open Graph / WhatsApp preview -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://perrosdelaisla.github.io/hola/">
  <meta property="og:title" content="Habla con Victoria, nuestra coordinadora 🐾">
  <meta property="og:description" content="Te ayudo a encontrar el plan ideal para tu perro. En 5 minutos.">
  <meta property="og:image" content="https://i.ibb.co/FkCVpG1j/icon.png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta property="og:site_name" content="Perros de la Isla">
  <meta property="og:locale" content="es_ES">
  <!-- Twitter/X preview -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Habla con Victoria, nuestra coordinadora 🐾">
  <meta name="twitter:description" content="Te ayudo a encontrar el plan ideal para tu perro. En 5 minutos.">
  <meta name="twitter:image" content="https://i.ibb.co/FkCVpG1j/icon.png">
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://i.ibb.co/Q7Ssr8XM/icon.png">
  <!-- Bebas Neue -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <!-- Estilos -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── SPLASH DE BIENVENIDA ── -->
  <div id="splash" class="splash-wrap">
    <div class="splash-bg splash-bg-active" style="background-image: url('https://i.ibb.co/v4rVVPsR/IMG-20200802-WA0004-2.jpg');"></div>
    <div class="splash-overlay-dark"></div>
    <div class="splash-overlay-brand"></div>

    <div class="splash-header">
      <div class="splash-logo-row">
        <img class="splash-logo-img" src="https://i.ibb.co/FkCVpG1j/icon.png" alt="Perros de la Isla">
        <span class="splash-brand-name">Perros de la Isla</span>
      </div>
      <span class="splash-brand-tagline">Adiestramiento canino · Mallorca</span>
    </div>

    <div class="splash-carlos-tag">
      <p>
        Carlos Acevedo<br>
        <span>Instructor canino profesional</span>
      </p>
    </div>

    <div class="splash-footer">
      <div class="splash-accent-line"></div>
      <p class="splash-lema">Tu perro<br>merece ser<br>feliz, hoy</p>
      <button id="splash-start-btn" class="splash-cta">
        Hablar con Victoria
        <span class="splash-cta-arrow">→</span>
      </button>
      <p class="splash-sub">Consulta en 2 minutos</p>
    </div>
  </div>

  <!-- ── MINI-HEADER STICKY ── -->
  <div class="chat-mini-header">
    <img class="chat-mini-logo-img" src="https://i.ibb.co/FkCVpG1j/icon.png" alt="Perros de la Isla">
    <div class="chat-mini-info">
      <span class="chat-mini-name">Victoria</span>
      <span class="chat-mini-status">
        <span class="chat-mini-dot"></span> En línea · Coordinadora
      </span>
    </div>
  </div>

  <!-- ── BARRA DE PROGRESO ── -->
  <div class="prog-bar">
    <div class="prog-fill" id="pf"></div>
  </div>

  <!-- ── CHAT ── -->
  <div class="chat" id="chat">
    <!-- Typing indicator (siempre al final del chat) -->
    <div class="twrap" id="tw">
      <div class="av">
        <img src="https://i.ibb.co/1GXMwqzQ/victoria-cuadrada.jpg" alt="Victoria">
      </div>
      <div class="tbub">
        <div class="tdot"></div>
        <div class="tdot"></div>
        <div class="tdot"></div>
      </div>
    </div>
  </div>

  <!-- ── INPUT DE TEXTO (fixed abajo) ── -->
  <div class="input-wrap" id="victoria-input-wrap">
    <div class="irow">
      <input
        class="ti"
        type="text"
        id="victoria-input"
        placeholder="Escribe aquí…"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        inputmode="text"
      />
      <button class="sb" id="victoria-send" aria-label="Enviar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <!-- ── SCRIPTS ── -->
  <script type="module">
    import { start } from './victoria.js?v=22';
    start();
  </script>
</body>
</html>
