<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Perros de la Isla · Consulta con Victoria, coordinadora de adiestramiento canino en Mallorca">
  <title>Perros de la Isla · Hola</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://i.ibb.co/Q7Ssr8XM/icon.png">

  <!-- Estilos -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── HEADER ── -->
  <div class="hd">
    <div class="logo-wrap">
      <img src="https://i.ibb.co/Q7Ssr8XM/icon.png" alt="Perros de la Isla" width="26" height="22" style="object-fit:contain">
    </div>
    <div class="hinfo">
      <div class="hname">Perros de la Isla</div>
      <div class="hrole">
        <div class="dot"></div>
        <span>Victoria · Coordinadora</span>
      </div>
    </div>
    <div class="hbrand">@perrosdelaisla<br>Mallorca</div>
  </div>

  <!-- ── BARRA DE PROGRESO ── -->
  <div class="prog-bar">
    <div class="prog-fill" id="pf"></div>
  </div>

  <!-- ── CHAT ── -->
  <div class="chat" id="chat">

    <!-- Typing indicator (siempre al final del chat) -->
    <div class="twrap" id="tw">
      <div class="av">
        <img src="https://i.ibb.co/Q7Ssr8XM/icon.png" alt="V" width="19" height="16" style="object-fit:contain">
      </div>
      <div class="tbub">
        <div class="tdot"></div>
        <div class="tdot"></div>
        <div class="tdot"></div>
      </div>
    </div>

  </div>

  <!-- ── PANEL DE OPCIONES (fijo abajo) ── -->
  <div class="panel off" id="panel">
    <div class="phint" id="phint">Elige una opción</div>
    <div class="opts" id="opts"></div>
  </div>

  <!-- ── SCRIPTS (módulos ES6) ── -->
  <script type="module">
    import { start } from './victoria.js';
    // Arrancar la conversación
    start();
  </script>

</body>
</html>
