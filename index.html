<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Perros de la Isla · Consulta con Victoria, coordinadora de adiestramiento canino en Mallorca">
  <title>Perros de la Isla · Hola</title>
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://i.ibb.co/Q7Ssr8XM/icon.png">
  <!-- Estilos -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- ── HEADER ── -->
  <div class="hd">
    <div class="logo-wrap">
      <img src="https://i.ibb.co/Q7Ssr8XM/icon.png" alt="Perros de la Isla" width="26" height="22" style="object-fit:contain">
    </div>
    <div class="hinfo">
      <div class="hname">Perros de la Isla</div>
      <div class="hrole">
        <div class="dot"></div>
        <span>Victoria · Coordinadora</span>
      </div>
    </div>
    <div class="hbrand">@perrosdelaisla<br>Mallorca</div>
  </div>
  <!-- ── BARRA DE PROGRESO ── -->
  <div class="prog-bar">
    <div class="prog-fill" id="pf"></div>
  </div>
  <!-- ── CHAT ── -->
  <div class="chat" id="chat">
    <!-- Typing indicator (siempre al final del chat) -->
    <div class="twrap" id="tw">
      <div class="av">
        <img src="https://i.ibb.co/1GXMwqzQ/victoria-cuadrada.jpg" alt="Victoria">
      </div>
      <div class="tbub">
        <div class="tdot"></div>
        <div class="tdot"></div>
        <div class="tdot"></div>
      </div>
    </div>
  </div>
  <!-- ── INPUT DE TEXTO (fixed abajo) ── -->
  <div class="input-wrap" id="victoria-input-wrap">
    <div class="irow">
      <input
        class="ti"
        type="text"
        id="victoria-input"
        placeholder="Escribe aquí…"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        inputmode="text"
      />
      <button class="sb" id="victoria-send" aria-label="Enviar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
  <!-- ── SCRIPTS (módulos ES6) ── -->
  <script type="module">
    import { start } from './victoria.js?v=12';
    start();
  </script>
</body>
</html>
