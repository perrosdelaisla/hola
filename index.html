<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Perros de la Isla · Consulta con Victoria, coordinadora de adiestramiento canino en Mallorca">
  <title>Perros de la Isla · Hola</title>
  <!-- Open Graph / WhatsApp preview -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://perrosdelaisla.github.io/hola/">
  <meta property="og:title" content="Habla con Victoria, nuestra coordinadora 🐾">
  <meta property="og:description" content="Te ayudo a encontrar el plan ideal para tu perro. En 5 minutos.">
  <meta property="og:image" content="https://i.ibb.co/FkCVpG1j/icon.png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta property="og:site_name" content="Perros de la Isla">
  <meta property="og:locale" content="es_ES">
  <!-- Twitter/X preview -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Habla con Victoria, nuestra coordinadora 🐾">
  <meta name="twitter:description" content="Te ayudo a encontrar el plan ideal para tu perro. En 5 minutos.">
  <meta name="twitter:image" content="https://i.ibb.co/FkCVpG1j/icon.png">
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://i.ibb.co/Q7Ssr8XM/icon.png">
  <!-- Bebas Neue -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <!-- Estilos -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── HEADER STICKY ── -->
  <header class="pdli-header">
    <div class="pdli-header-logo">
      <img src="https://i.ibb.co/FkCVpG1j/icon.png" alt="Perros de la Isla">
    </div>
    <div class="pdli-header-info">
      <div class="pdli-header-title">Perros de la Isla</div>
      <div class="pdli-header-subtitle">Adiestramiento canino profesional</div>
    </div>
    <div class="pdli-header-links">
      <a href="https://instagram.com/perrosdelaisla" target="_blank" rel="noopener" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
          <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
        </svg>
      </a>
      <a href="https://perrosdelaisla.com" target="_blank" rel="noopener" aria-label="Web">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
      </a>
    </div>
  </header>

  <!-- ── BARRA DE PROGRESO ── -->
  <div class="prog-bar">
    <div class="prog-fill" id="pf"></div>
  </div>

  <!-- ── CHAT ── -->
  <div class="chat" id="chat">
    <!-- Typing indicator (siempre al final del chat) -->
    <div class="twrap" id="tw">
      <div class="av">
        <img src="https://i.ibb.co/1GXMwqzQ/victoria-cuadrada.jpg" alt="Victoria">
      </div>
      <div class="tbub">
        <div class="tdot"></div>
        <div class="tdot"></div>
        <div class="tdot"></div>
      </div>
    </div>
  </div>

  <!-- ── INPUT DE TEXTO (fixed abajo) ── -->
  <div class="input-wrap" id="victoria-input-wrap">
    <div class="irow">
      <input
        class="ti"
        type="text"
        id="victoria-input"
        placeholder="Escribe aquí…"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        inputmode="text"
      />
      <button class="sb" id="victoria-send" aria-label="Enviar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <!-- ── SCRIPTS ── -->
  <script type="module">
    import { start } from './victoria.js?v=31';
    start();
  </script>
</body>
</html>
